<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <title>Nuria — The Honest Online Bookstore</title>
    <meta name="description" content="Kenya's leading online bookstore. Discover African literature, bestsellers, and educational texts — all delivered to your door." />
    <meta name="author" content="Nuria Forest" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preload critical fonts (self-hosted, zero external chain) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/dm-sans-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/playfair-latin.woff2" crossorigin />

    <!-- LCP Image Preload — mobile-first (13KB vs 49KB) -->
    <link rel="preload" as="image" href="/images/hero-mobile.webp" fetchpriority="high" media="(max-width: 768px)" />
    <link rel="preload" as="image" href="/images/hero.webp" fetchpriority="high" media="(min-width: 769px)" />

    <meta property="og:title" content="Nuria — The Honest Store" />
    <meta property="og:description" content="Discover Africa's greatest stories. Kenya's largest online bookstore." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NuriaStore" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <noscript>
      <div style="padding: 2rem; font-family: sans-serif; text-align: center;">
        <h1>Nuria — The Honest Online Bookstore</h1>
        <p>Please enable JavaScript to browse our catalog of 21,000+ books.</p>
      </div>
    </noscript>
    <div id="root">
      <!-- Static LCP shell: browser paints this INSTANTLY before React boots -->
      <div style="position:relative;width:100%;height:80vh;overflow:hidden;background:#354024">
        <img
          src="/images/hero-mobile.webp"
          srcset="/images/hero-mobile.webp 480w, /images/hero.webp 800w"
          sizes="100vw"
          alt="New Arrivals"
          width="800"
          height="470"
          fetchpriority="high"
          style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.7)"
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
